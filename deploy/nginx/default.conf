log_format sd_safe '$remote_addr - $remote_user [$time_local] '
                   '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" request_id=$sd_request_id';

map $http_x_request_id $sd_request_id {
    default $http_x_request_id;
    "" $request_id;
}

server {
    listen 80 default_server;
    server_name _;
    return 308 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name sd.intra.example.com;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    access_log /var/log/nginx/access.log sd_safe;
    error_log /var/log/nginx/error.log warn;

    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self'; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 25m;
    root /usr/share/nginx/html;

    location = /api/sso/oa/callback {
        access_log off;
        proxy_set_header X-Request-Id $sd_request_id;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://sd-api:8000;
    }

    location /api/ {
        proxy_set_header X-Request-Id $sd_request_id;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_pass http://sd-api:8000;
    }

    location = /healthz {
        access_log off;
        proxy_pass http://sd-api:8000;
    }

    location = /readyz {
        access_log off;
        proxy_pass http://sd-api:8000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    server_name teable.sd.intra.example.com;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    access_log /var/log/nginx/teable-access.log sd_safe;

    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    client_max_body_size 25m;

    location / {
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_pass http://teable:3000;
    }
}
